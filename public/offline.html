<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Co-Op Budget — Offline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: #0f0f0f;
      --surface-2: #1a1a1a;
      --border: rgba(255,255,255,0.08);
      --text: #e8e6e3;
      --text-muted: #6b6966;
      --accent: #7c6ff7;
      --accent-glow: rgba(124,111,247,0.20);
      --accent-bg: rgba(124,111,247,0.10);
      --green: #4ade80;
      --green-glow: rgba(74,222,128,0.20);
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px 32px 36px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 64px rgba(0,0,0,0.6);
      backdrop-filter: blur(20px);
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      background: var(--accent-bg);
      border: 1px solid rgba(124,111,247,0.25);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 32px var(--accent-glow);
    }

    .icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-muted);
      max-width: 28ch;
      margin: 0 auto 28px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.1px;
      transition: opacity 0.15s ease, transform 0.15s ease;
      box-shadow: 0 0 24px var(--accent-glow);
    }

    .btn:hover  { opacity: 0.88; }
    .btn:active { transform: scale(0.97); opacity: 0.8; }

    .btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2.2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .cached-note {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .cached-note strong {
      color: var(--green);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- wifi-off icon -->
      <svg viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
      </svg>
    </div>

    <h1>You're Offline</h1>
    <p>Connect to the internet to sync your latest transactions and balances.</p>

    <div class="status-row">
      <span class="dot"></span>
      <span>Waiting for connection&hellip;</span>
    </div>

    <button class="btn" onclick="window.location.reload()">
      <svg viewBox="0 0 24 24">
        <polyline points="23 4 23 10 17 10"/>
        <polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Try Again
    </button>

    <div class="divider"></div>

    <p class="cached-note">
      <strong>Cached data available.</strong><br />
      Your previously loaded screens are still accessible &mdash; just navigate back.
    </p>
  </div>

  <script>
    // Auto-reload when connection is restored
    window.addEventListener('online', () => window.location.reload())
  </script>
</body>
</html>
