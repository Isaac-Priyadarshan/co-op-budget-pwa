<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- VIEWPORT: viewport-fit=cover extends the rendered surface behind the
         iOS home indicator and status bar. Without this, iOS clips the app
         to the 'safe area' rectangle, leaving raw black bars at top and bottom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PRIMARY THEME COLOURS -->
    <meta name="theme-color" content="#04050b" />
    <meta name="msapplication-navbutton-color" content="#04050b" />

    <!-- PWA MANIFEST -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ANDROID PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="I &amp; J Budget" />

    <!-- iOS TOUCH ICONS -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- iOS SPLASH SCREENS -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-390x844.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
      href="/icons/splash-390x844.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-390x844.png"
    />

    <!-- SEO -->
    <meta name="description" content="Private Co-Op Budget App for Isaac &amp; Jenifa" />

    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />

    <!-- ─── INTER FONT — Google Fonts ────────────────────────────────────────
         Inter is loaded here (in <head>, before any CSS/JS) so it is
         available on frame 0. preconnect directives eliminate the DNS +
         TLS handshake latency. font-display=swap ensures text is visible
         immediately in a fallback font while Inter loads, then swaps in.

         We load weights 300–700 as a variable font range — one request
         covers all weights the app uses. Inter is identical across
         Android, iOS, Chrome, Safari, and Firefox — eliminating the
         system-font variance that caused the "font changed" bug.           -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <title>I &amp; J Budget</title>

    <!--
      SAFE-AREA PRE-PAINT SCRIPT  (v2 — two-layer defence)
      ─────────────────────────────────────────────────────────────────────────
      LAYER 1 — Synchronous probe (runs before any CSS / React):
        Creates a position:fixed div with height:env(safe-area-inset-top).
        iOS WebKit resolves height synchronously at getBoundingClientRect()
        time (unlike padding, which is deferred one frame).
        Writes --sat / --sab onto <html> so layout code never uses env() inline.

      LAYER 2 — Deferred re-probe via requestAnimationFrame:
        On iOS PWA (Home Screen / standalone) the viewport geometry is NOT
        finalised when the synchronous probe runs — getBoundingClientRect()
        returns 0. The rAF callback fires after the first layout pass when
        geometry IS correct. If --sat was written as 0px by the sync probe
        (or if the value actually changed), we re-measure and patch it.
        This is the primary fix for the status-bar-overflow regression.

      FALLBACK:
        If env() is unsupported (desktop, Android without cutout) the probe
        height resolves to 0 and vars stay at 0px — correct behaviour.
        The :root fallback in index.css also guarantees 0px.
    -->
    <script>
      (function () {
        /* ── Shared probe helper ───────────────────────────────────────── */
        function measureSafeArea() {
          var result = { sat: 0, sab: 0 };
          try {
            /* TOP probe */
            var pt = document.createElement('div');
            pt.style.cssText = [
              'position:fixed',
              'top:0',
              'left:0',
              'width:1px',
              'height:env(safe-area-inset-top,0px)',
              'pointer-events:none',
              'visibility:hidden',
              'z-index:-1',
            ].join(';');
            document.documentElement.appendChild(pt);
            result.sat = pt.getBoundingClientRect().height || 0;
            document.documentElement.removeChild(pt);

            /* BOTTOM probe */
            var pb = document.createElement('div');
            pb.style.cssText = [
              'position:fixed',
              'bottom:0',
              'left:0',
              'width:1px',
              'height:env(safe-area-inset-bottom,0px)',
              'pointer-events:none',
              'visibility:hidden',
              'z-index:-1',
            ].join(';');
            document.documentElement.appendChild(pb);
            result.sab = pb.getBoundingClientRect().height || 0;
            document.documentElement.removeChild(pb);
          } catch (e) { /* silent */ }
          return result;
        }

        /* ── LAYER 1: Synchronous probe ────────────────────────────────── */
        var m1 = measureSafeArea();
        document.documentElement.style.setProperty('--sat', m1.sat + 'px');
        document.documentElement.style.setProperty('--sab', m1.sab + 'px');

        /* ── LAYER 2: Deferred re-probe after first layout ─────────────── */
        /*
         * On iOS PWA (standalone / Home Screen launch), the synchronous
         * probe above executes before WebKit finalises viewport geometry,
         * so getBoundingClientRect() returns 0 and --sat is written as 0px.
         *
         * requestAnimationFrame fires AFTER the first layout pass, at which
         * point env(safe-area-inset-top) resolves to the correct pixel value
         * (59px on iPhone 14 Pro, 47px on iPhone SE, etc.).
         *
         * We re-measure and patch --sat / --sab unconditionally so any race
         * between the sync probe and viewport finalisation is always resolved.
         */
        if (typeof requestAnimationFrame !== 'undefined') {
          requestAnimationFrame(function () {
            /* One rAF = after layout. Double-rAF = after paint. */
            /* Single rAF is sufficient — geometry is ready after layout. */
            var m2 = measureSafeArea();
            /* Only write if the value actually changed to avoid redundant
               style recalculations on devices where sync probe was correct. */
            if (m2.sat !== m1.sat) {
              document.documentElement.style.setProperty('--sat', m2.sat + 'px');
            }
            if (m2.sab !== m1.sab) {
              document.documentElement.style.setProperty('--sab', m2.sab + 'px');
            }
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
