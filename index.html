<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- VIEWPORT: viewport-fit=cover extends the rendered surface behind the
         iOS home indicator and status bar. Without this, iOS clips the app
         to the 'safe area' rectangle, leaving raw black bars at top and bottom. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PRIMARY THEME COLOURS -->
    <meta name="theme-color" content="#04050b" />
    <meta name="msapplication-navbutton-color" content="#04050b" />

    <!-- PWA MANIFEST -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- ANDROID PWA -->
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="I &amp; J Budget" />

    <!-- iOS TOUCH ICONS -->
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- iOS SPLASH SCREENS -->
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-390x844.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
      href="/icons/splash-390x844.png"
    />
    <link
      rel="apple-touch-startup-image"
      media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
      href="/icons/splash-390x844.png"
    />

    <!-- SEO -->
    <meta name="description" content="Private Co-Op Budget App for Isaac &amp; Jenifa" />

    <!-- FAVICON -->
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />

    <title>I &amp; J Budget</title>

    <!--
      SAFE-AREA PRE-PAINT SCRIPT
      ─────────────────────────────────────────────────────────────────────────
      WHY THIS EXISTS:
      env(safe-area-inset-bottom/top) are CSS environment variables that iOS
      resolves during layout. When used directly in inline React styles, iOS
      applies them one frame late — causing content to sit under the status
      bar / Dynamic Island on the very first render.

      HOW THIS FIXES IT:
      This script runs synchronously before any CSS or React code executes.
      It creates two temporary probe elements and measures their HEIGHTS
      (not padding). Setting height:env(...) is resolved by iOS synchronously
      at the time getComputedStyle is called — unlike padding-top:env()
      which iOS defers to the next layout pass.

      The resolved pixel values are written as --sat and --sab on <html>
      so they are available with correct values on frame 0.

      FALLBACK:
      If env() is unsupported (desktop, Android without cutout),
      the probe height resolves to 0 and vars are set to 0px.
      The :root fallback in index.css also guarantees 0px.
    -->
    <script>
      (function () {
        try {
          // ── TOP safe area probe ─────────────────────────────────────────
          // Use height:env(safe-area-inset-top) — height is resolved
          // synchronously by iOS WebKit; padding is deferred one frame.
          var probeTop = document.createElement('div');
          probeTop.style.cssText = [
            'position:fixed',
            'top:0',
            'left:0',
            'width:0',
            'height:env(safe-area-inset-top,0px)',
            'pointer-events:none',
            'visibility:hidden',
          ].join(';');
          document.head.appendChild(probeTop);
          var sat = probeTop.getBoundingClientRect().height || 0;
          document.head.removeChild(probeTop);

          // ── BOTTOM safe area probe ──────────────────────────────────────
          var probeBot = document.createElement('div');
          probeBot.style.cssText = [
            'position:fixed',
            'bottom:0',
            'left:0',
            'width:0',
            'height:env(safe-area-inset-bottom,0px)',
            'pointer-events:none',
            'visibility:hidden',
          ].join(';');
          document.head.appendChild(probeBot);
          var sab = probeBot.getBoundingClientRect().height || 0;
          document.head.removeChild(probeBot);

          // Write as real CSS custom properties on <html>.
          // All layout code uses var(--sat) / var(--sab) — never env() inline.
          document.documentElement.style.setProperty('--sat', sat + 'px');
          document.documentElement.style.setProperty('--sab', sab + 'px');
        } catch (e) {
          // Silent fallback — :root vars in index.css provide 0px defaults.
          document.documentElement.style.setProperty('--sat', '0px');
          document.documentElement.style.setProperty('--sab', '0px');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
